name: PetNest Dog Monitor

on:
  schedule:
    # Runs every hour — GitHub Actions cron uses UTC
    - cron: '0 * * * *'
  workflow_dispatch:  # Allows manual trigger from the Actions tab

# Write permission needed to commit seen_dogs.json state back to the repo
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required so we can push the updated state file back
          fetch-depth: 0
          persist-credentials: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: pet-nest-monitor

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: dotnet run --no-restore
        working-directory: pet-nest-monitor

      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pet-nest-monitor/seen_dogs.json
          # Only commit if seen_dogs.json actually changed; [skip ci] prevents re-triggering
          git diff --staged --quiet || git commit -m "chore: update seen dogs state [skip ci]"
          git push
